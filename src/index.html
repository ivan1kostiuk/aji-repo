<!-- Download Live Server and run index.html with Liver Server -->

<head>
    <title>Quiz App</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>

    <!-- MENU SCREEN -->
    <div id="menu">

        <h1>Quiz Game</h1>

        <button id="mode1">Guess the Capital</button>
        <button id="mode2">Guess the Flag</button>
        <button id="mode3">Mode 3</button>

    </div>

    
    <!-- QUIZ SCREEN -->
    <div id="quiz" style="display: none;">


        <div id="quizStats">
            <h2 id="score" >Score: 0</h2>

        </div>

        <div id="quizScreen" >
            <h1 id="currentQuestion">Question 1</h2>

            <h2 id="question"></h2>

            <div id="answers"></div>

            <p id="result"></p>

            <button id="nextBtn">Next</button>

            <button id="menuBtn">Menu</button>
        
            <button id="playAgainBtn" style="display: none;">Play Again</button>

        </div>


    </div>

    <script type="module" src="index.js"></script>

</body>
