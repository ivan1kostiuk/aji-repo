<!-- Download Live Server and run index.html with Liver Server -->

<head>
    <title>Quiz App</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>

    <!-- MENU SCREEN -->
    <div id="menu">

        <h1>Quiz Game</h1>

        <button id="mode1">Guess the Capital</button>
        <button id="mode2">Guess the Flag</button>
        <button id="mode3">Highest Population Quiz</button>
        <button id="mode4">Higher or Lower Population</button>

    </div>

    
    <!-- QUIZ SCREEN -->
    <div id="quiz" style="display: none;">
        <button id="menuBtn">Menu</button>


        <div id="quizStats">
            <h2 id="score" >Score: 0</h2>

        </div>

        <div id="quizScreen" >
            <h1 id="currentQuestion">Question 1</h1>

            <h2 id="question"></h2>

            <div id="answers"></div>

            <p id="result"></p>

            <button id="nextBtn">Next</button>
        
            <button id="playAgainBtn" style="display: none;">Play Again</button>

        </div>

        <!-- HIGHER LOWER -->
        <div id="higherLowerLayout" style="display: none;">
            <button id="playAgainBtn" style="display: none;">Play Again</button>

            <div id="leftCountry">

                <h2 id="leftCountryName"></h2>

                <p class="populationText">Population:</p>

                <h1 id="leftPopulation"></h1>

            </div>

            <div id="rightCountry">

                <h2 id="rightCountryName"></h2>

                <p class="populationText">Has a population...</p>

                <div id="higherLowerButtons">

                    <button id="higherBtn">
                        Higher
                    </button>

                    <button id="lowerBtn">
                        Lower
                    </button>

                </div>

            </div>

        </div>

</div>
    <script type="module" src="index.js"></script>

</body>
